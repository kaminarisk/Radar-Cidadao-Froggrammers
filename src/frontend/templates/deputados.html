<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deputados | Radar Cidadão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="toast" class="toast"></div>

<header class="navbar">
    <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>
    <nav>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/deputados.html" class="active">Deputados</a></li>
            <li><a href="/relatorios.html">Relatórios</a></li>
            <li><a href="/graficos.html">Gráficos</a></li>
        </ul>
    </nav>
</header>

<main class="container">

    <h1>Deputados Federais</h1>
    <p id="contagem">Carregando...</p>

    <!-- FILTROS -->
    <div class="card" style="margin-bottom:20px;">
        <input type="text" id="busca-nome" placeholder="Buscar deputado...">

        <select id="filtro-estado">
            <option value="">Estado</option>
        </select>

        <select id="filtro-partido">
            <option value="">Partido</option>
        </select>

        <button id="btn-modo" onclick="toggleModoComparacao()">
            Comparar Deputados
        </button>

        <button id="btn-gerar-comparacao" onclick="gerarComparacao()" style="display:none;">
            Gerar Comparação [0/8]
        </button>
    </div>

    <!-- LISTA -->
    <div id="lista-deputados" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal-comparacao" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal()">X</button>
        <h2>Comparação</h2>
        <div id="conteudo-comparacao"></div>
    </div>
</div>

<script>
let selecionados = new Set();
let modoComparacao = false;
let todosDeputados = [];

// 🔥 CORREÇÃO PRINCIPAL AQUI
async function carregarDeputados() {
    try {
        const res = await fetch('/api/deputados');
        const json = await res.json();

        // 👇 AGORA É DIRETO
        todosDeputados = json;

        popularFiltros(todosDeputados);
        renderizarCards(todosDeputados);

    } catch (e) {
        console.error(e);
        document.getElementById('contagem').innerText = "Erro ao carregar";
    }
}

function popularFiltros(dados) {
    const estados = [...new Set(dados.map(d => d.uf))].sort();
    const partidos = [...new Set(dados.map(d => d.partido))].sort();

    estados.forEach(uf => {
        filtro_estado.innerHTML += `<option value="${uf}">${uf}</option>`;
    });

    partidos.forEach(p => {
        filtro_partido.innerHTML += `<option value="${p}">${p}</option>`;
    });
}

function renderizarCards(lista) {
    const container = document.getElementById('lista-deputados');

    contagem.innerText = `${lista.length} deputados`;

    container.innerHTML = lista.map(d => `
        <div class="card" style="border:${selecionados.has(d.id) ? '2px solid orange' : '1px solid #ddd'}">

            <img src="${d.foto}" 
                onerror="this.src='https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png'">

            <h3>${d.nome}</h3>
            <p>${d.partido} - ${d.uf}</p>

            ${
                modoComparacao
                ? `<button class="btn-selecionar" data-id="${d.id}">
                        ${selecionados.has(d.id) ? "Selecionado" : "Selecionar"}
                   </button>`
                : `<a href="/perfil.html?id=${d.id}">Ver Perfil</a>`
            }

        </div>
    `).join('');
}

function aplicarFiltros() {
    const nome = busca_nome.value.toLowerCase();
    const estado = filtro_estado.value;
    const partido = filtro_partido.value;

    const filtrados = todosDeputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (estado === "" || d.uf === estado) &&
        (partido === "" || d.partido === partido)
    );

    renderizarCards(filtrados);
}

busca_nome.addEventListener("input", aplicarFiltros);
filtro_estado.addEventListener("change", aplicarFiltros);
filtro_partido.addEventListener("change", aplicarFiltros);

// COMPARAÇÃO
function toggleModoComparacao() {
    modoComparacao = !modoComparacao;

    btn_modo.innerText = modoComparacao ? "Voltar" : "Comparar Deputados";
    btn_gerar_comparacao.style.display = modoComparacao ? "inline-block" : "none";

    if (!modoComparacao) selecionados.clear();

    atualizarBotao();
    renderizarCards(todosDeputados);
}

document.addEventListener("click", (e) => {
    if (!modoComparacao) return;

    const btn = e.target.closest(".btn-selecionar");
    if (!btn) return;

    const id = Number(btn.dataset.id);

    if (selecionados.has(id)) {
        selecionados.delete(id);
    } else {
        if (selecionados.size >= 8) {
            toast("Máx 8 deputados");
            return;
        }
        selecionados.add(id);
    }

    atualizarBotao();
    renderizarCards(todosDeputados);
});

function atualizarBotao() {
    btn_gerar_comparacao.innerText =
        `Gerar Comparação [${selecionados.size}/8]`;
}

function gerarComparacao() {
    if (selecionados.size < 2) return;

    const lista = todosDeputados.filter(d => selecionados.has(d.id));

    conteudo_comparacao.innerHTML = `
        <table>
            <tr>
                ${lista.map(d => `<th>${d.nome}</th>`).join('')}
            </tr>
            <tr>
                ${lista.map(d => `<td>${d.partido}</td>`).join('')}
            </tr>
            <tr>
                ${lista.map(d => `<td>${d.uf}</td>`).join('')}
            </tr>
        </table>
    `;

    modal_comparacao.style.display = "flex";
}

function fecharModal() {
    modal_comparacao.style.display = "none";
}

function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(() => t.classList.remove("show"), 2000);
}

carregarDeputados();
</script>

</body>
</html>
