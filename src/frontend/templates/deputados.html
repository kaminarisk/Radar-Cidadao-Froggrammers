<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Deputados | Radar Cidadão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div id="toast" class="toast"></div>

<header class="navbar">
    <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>
    <nav>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/deputados.html" class="active">Deputados</a></li>
            <li><a href="/relatorios.html">Relatórios</a></li>
            <li><a href="/graficos.html">Gráficos</a></li>
        </ul>
    </nav>
</header>

<main class="container">

    <h1>Deputados Federais</h1>
    <p id="contagem">Carregando...</p>

    <div class="card" style="margin-bottom:20px;">
        <input type="text" id="busca-nome" placeholder="Buscar deputado...">

        <select id="filtro-estado">
            <option value="">Estado</option>
        </select>

        <select id="filtro-partido">
            <option value="">Partido</option>
        </select>

        <button id="btn-modo">Comparar Deputados</button>

        <button id="btn-gerar-comparacao" style="display:none;">
            Gerar Comparação [0/8]
        </button>
    </div>

    <div id="lista-deputados" class="grid"></div>

</main>

<!-- MODAL -->
<div id="modal-comparacao" class="modal">
    <div class="modal-content">
        <button onclick="fecharModal()">X</button>
        <h2>Comparação de Deputados</h2>
        <div id="conteudo-comparacao"></div>
    </div>
</div>

<script>
let selecionados = new Set();
let modoComparacao = false;
let todosDeputados = [];

// ELEMENTOS
const buscaNome = document.getElementById("busca-nome");
const filtroEstado = document.getElementById("filtro-estado");
const filtroPartido = document.getElementById("filtro-partido");
const contagem = document.getElementById("contagem");
const btnModo = document.getElementById("btn-modo");
const btnGerar = document.getElementById("btn-gerar-comparacao");
const modal = document.getElementById("modal-comparacao");
const conteudo = document.getElementById("conteudo-comparacao");

// 🔥 FUNÇÃO CORRIGIDA (resolve teu erro)
async function carregarDeputados() {
    try {
        const res = await fetch('/api/deputados');
        const json = await res.json();

        // SUPORTA os dois formatos de API
        todosDeputados = Array.isArray(json) ? json : json.dados || [];

        if (todosDeputados.length === 0) {
            contagem.innerText = "Nenhum deputado encontrado";
            return;
        }

        contagem.innerText = `${todosDeputados.length} deputados carregados`;

        popularFiltros(todosDeputados);
        renderizarCards(todosDeputados);

    } catch (e) {
        console.error(e);
        contagem.innerText = "Erro ao carregar";
    }
}

// 🔥 EVITA DUPLICAÇÃO
function popularFiltros(dados) {
    filtroEstado.innerHTML = '<option value="">Estado</option>';
    filtroPartido.innerHTML = '<option value="">Partido</option>';

    const estados = [...new Set(dados.map(d => d.uf))].sort();
    const partidos = [...new Set(dados.map(d => d.partido))].sort();

    estados.forEach(uf => {
        filtroEstado.innerHTML += `<option value="${uf}">${uf}</option>`;
    });

    partidos.forEach(p => {
        filtroPartido.innerHTML += `<option value="${p}">${p}</option>`;
    });
}

function renderizarCards(lista) {
    const container = document.getElementById('lista-deputados');

    container.innerHTML = lista.map(d => `
        <div class="card" style="border:${selecionados.has(d.id) ? '2px solid orange' : '1px solid #ddd'}">

            <img src="${d.foto}" 
                 onerror="this.src='https://www.camara.leg.br/tema/assets/images/foto-deputado-ausente.png'">

            <h3>${d.nome}</h3>
            <p>${d.partido} - ${d.uf}</p>

            ${
                modoComparacao
                ? `<button class="btn-selecionar" data-id="${d.id}">
                        ${selecionados.has(d.id) ? "Selecionado" : "Selecionar"}
                   </button>`
                : `<a href="/perfil.html?id=${d.id}">Ver Perfil</a>`
            }

        </div>
    `).join('');
}

// FILTROS
function aplicarFiltros() {
    const nome = buscaNome.value.toLowerCase();
    const estado = filtroEstado.value;
    const partido = filtroPartido.value;

    const filtrados = todosDeputados.filter(d =>
        d.nome.toLowerCase().includes(nome) &&
        (estado === "" || d.uf === estado) &&
        (partido === "" || d.partido === partido)
    );

    contagem.innerText = `${filtrados.length} deputados`;

    renderizarCards(filtrados);
}

buscaNome.addEventListener("input", aplicarFiltros);
filtroEstado.addEventListener("change", aplicarFiltros);
filtroPartido.addEventListener("change", aplicarFiltros);

// MODO COMPARAÇÃO
btnModo.onclick = () => {
    modoComparacao = !modoComparacao;

    btnModo.innerText = modoComparacao ? "Voltar" : "Comparar Deputados";
    btnGerar.style.display = modoComparacao ? "inline-block" : "none";

    if (!modoComparacao) selecionados.clear();

    atualizarBotao();
    renderizarCards(todosDeputados);
};

// SELEÇÃO
document.addEventListener("click", (e) => {
    if (!modoComparacao) return;

    const btn = e.target.closest(".btn-selecionar");
    if (!btn) return;

    const id = Number(btn.dataset.id);

    if (selecionados.has(id)) {
        selecionados.delete(id);
    } else {
        if (selecionados.size >= 8) {
            toast("Máx 8 deputados");
            return;
        }
        selecionados.add(id);
    }

    atualizarBotao();
    renderizarCards(todosDeputados);
});

function atualizarBotao() {
    const qtd = selecionados.size;

    btnGerar.innerText = `Gerar Comparação [${qtd}/8]`;

    btnGerar.disabled = qtd < 2;
    btnGerar.style.opacity = qtd < 2 ? "0.5" : "1";
    btnGerar.style.cursor = qtd < 2 ? "not-allowed" : "pointer";
}

// COMPARAÇÃO
btnGerar.onclick = () => {
    if (selecionados.size < 2) return;

    const lista = todosDeputados.filter(d => selecionados.has(d.id));

    conteudo.innerHTML = `
        <table>
            <thead>
                <tr>
                    <th>Campo</th>
                    ${lista.map(d => `<th>${d.nome}</th>`).join('')}
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td><strong>Partido</strong></td>
                    ${lista.map(d => `<td>${d.partido}</td>`).join('')}
                </tr>
                <tr>
                    <td><strong>UF</strong></td>
                    ${lista.map(d => `<td>${d.uf}</td>`).join('')}
                </tr>
                <tr>
                    <td><strong>ID</strong></td>
                    ${lista.map(d => `<td>${d.id}</td>`).join('')}
                </tr>
            </tbody>
        </table>
    `;

    modal.style.display = "flex";
};

function fecharModal() {
    modal.style.display = "none";
}

// TOAST
function toast(msg) {
    const t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");

    setTimeout(() => t.classList.remove("show"), 2000);
}

// INIT
carregarDeputados();
</script>

</body>
</html>
