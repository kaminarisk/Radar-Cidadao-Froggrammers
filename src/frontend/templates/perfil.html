<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Perfil Parlamentar | Portal SJC</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="navbar">
        <a href="/" class="logo">PORTAL<span>SJC</span></a>

        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/deputados.html">Deputados</a></li>
                <li><a href="/relatorios.html">Relatórios</a></li>
                <li><a href="/graficos.html">Gráficos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div id="main-content"
             style="display:grid; grid-template-columns:320px 1fr; gap:30px; margin-top:20px;">

            <aside>
                <div class="card" style="text-align:center; position:sticky; top:20px;">

                    <div id="wrapper-foto"
                         style="min-height:250px; background:#f0f0f0; border-radius:8px; display:flex; align-items:center; justify-content:center; overflow:hidden;">
                        
                        <img id="dep-foto" style="width:100%; border-radius:8px; display:none;">
                        <span id="txt-foto">Carregando foto...</span>
                    </div>

                    <h2 id="dep-nome" style="margin:15px 0; color:var(--primary);">
                        Buscando...
                    </h2>

                    <div style="text-align:left; padding:10px; background:#f9f9f9; border-radius:5px;">
                        <p><strong>Partido:</strong> <span id="dep-partido">-</span></p>
                        <p><strong>UF:</strong> <span id="dep-uf">-</span></p>
                    </div>

                </div>
            </aside>

            <section>

                <div class="card"
                     style="margin-bottom:25px; border-left:5px solid var(--secondary); display:flex; justify-content:space-between; align-items:center;">
                    
                    <div>
                        <h3 style="font-size:0.8rem; color:var(--text-light); text-transform:uppercase;">
                            Total Acumulado (2025-2026)
                        </h3>

                        <h2 id="dep-total"
                            style="font-size:2.5rem; color:var(--primary); margin:5px 0;">
                            R$ 0,00
                        </h2>
                    </div>

                    <div id="status-carregamento"
                         style="font-size:0.75rem; color:#ff9800; font-weight:bold;">
                        Iniciando...
                    </div>
                </div>

                <div class="card">
                    <h3>Extrato de Despesas Detalhado</h3>

                    <div style="max-height:600px; overflow-y:auto; margin-top:15px;">
                        <table style="width:100%; border-collapse:collapse; font-size:0.85rem;">
                            
                            <thead style="background:#f8f9fa; position:sticky; top:0;">
                                <tr>
                                    <th style="padding:15px; border-bottom:2px solid #ddd;">Data</th>
                                    <th style="padding:15px; border-bottom:2px solid #ddd;">Despesa</th>
                                    <th style="padding:15px; border-bottom:2px solid #ddd; text-align:right;">Valor</th>
                                </tr>
                            </thead>

                            <tbody id="tabela-gastos"></tbody>

                        </table>
                    </div>
                </div>

            </section>
        </div>
    </main>

    <script>
        const idDeputado = new URLSearchParams(window.location.search).get('id');

        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function carregarTudo() {
            if (!idDeputado) return;

            await buscarPerfil();
            buscarGastos();
        }

        async function buscarPerfil() {
            const img = document.getElementById('dep-foto');
            const txt = document.getElementById('txt-foto');

            try {
                const res = await fetch(
                    `https://dadosabertos.camara.leg.br/api/v2/deputados/${idDeputado}`
                );

                const json = await res.json();
                const d = json.dados.ultimoStatus;

                document.getElementById('dep-nome').innerText = d.nome;
                document.getElementById('dep-partido').innerText = d.siglaPartido;
                document.getElementById('dep-uf').innerText = d.siglaUf;

                img.src = d.urlFoto + "?v=" + Date.now(); // evita bug de cache
                img.style.display = 'block';
                txt.style.display = 'none';

            } catch {
                txt.innerText = "Erro ao carregar";
            }
        }

        async function buscarGastos() {
            const status = document.getElementById('status-carregamento');

            let lista = [];
            const anos = [2026, 2025];

            for (let ano of anos) {
                let pagina = 1;
                let continuar = true;

                while (continuar) {
                    status.innerText = `${ano} pág ${pagina}`;

                    try {
                        const res = await fetch(
                            `https://dadosabertos.camara.leg.br/api/v2/deputados/${idDeputado}/despesas?ano=${ano}&pagina=${pagina}&itens=100`
                        );

                        const json = await res.json();

                        if (!json.dados || json.dados.length === 0) {
                            continuar = false;
                        } else {
                            lista = lista.concat(json.dados);
                            atualizarTabela(lista);
                            pagina++;
                            await delay(500);
                        }

                    } catch {
                        continuar = false;
                    }

                    if (pagina > 20) continuar = false;
                }
            }

            status.innerText = "Finalizado";
            status.style.color = "green";
        }

        function atualizarTabela(dados) {
            const tabela = document.getElementById('tabela-gastos');
            const totalDisplay = document.getElementById('dep-total');

            let soma = 0;

            tabela.innerHTML = dados.map(g => {
                soma += g.valorLiquido;

                let data = g.dataDocumento 
                    ? g.dataDocumento.substring(0,10).split('-').reverse().join('/')
                    : `01/${String(g.mes).padStart(2,'0')}/${g.ano}`;

                return `
                <tr>
                    <td style="padding:10px;">${data}</td>
                    <td style="padding:10px;">${g.tipoDespesa}</td>
                    <td style="padding:10px; text-align:right;">
                        ${g.valorLiquido.toLocaleString('pt-br',{style:'currency',currency:'BRL'})}
                    </td>
                </tr>
                `;
            }).join('');

            totalDisplay.innerText =
                soma.toLocaleString('pt-br',{style:'currency',currency:'BRL'});
        }

        carregarTudo();
    </script>
</body>
</html>
