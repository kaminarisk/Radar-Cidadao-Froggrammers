<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gráficos Financeiros | Radar Cidadão</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <header class="navbar">
        <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>

        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/deputados.html">Deputados</a></li>
                <li><a href="/relatorios.html">Relatórios</a></li>
                <li><a href="/graficos.html" class="active">Gráficos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <h2 style="margin-bottom: 30px; color: var(--primary);">
            Análise de Gastos por Colunas
        </h2>

        <div style="display: grid; grid-template-columns: 1fr; gap: 30px;">
            
            <div class="card">
                <h3 style="margin-bottom: 20px; color: var(--secondary);">
                    Gastos por Categoria (R$)
                </h3>
                <canvas id="chartBarras" style="width: 100%; height: 400px;"></canvas>
            </div>

            <div class="card">
                <h3 style="margin-bottom: 20px; color: var(--secondary);">
                    Evolução Mensal (2025)
                </h3>
                <canvas id="chartLinha" style="width: 100%; height: 300px;"></canvas>
            </div>

        </div>
    </main>

    <script>
        const id = new URLSearchParams(window.location.search).get('id') || '160976';

        async function carregarGraficos() {
            try {
                let catDados = {};
                let meses = Array(12).fill(0);

                const res = await fetch(
                    `https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=2025&itens=100`
                );

                const json = await res.json();

                (json.dados || []).forEach(g => {
                    catDados[g.tipoDespesa] =
                        (catDados[g.tipoDespesa] || 0) + g.valorLiquido;

                    if (g.mes >= 1 && g.mes <= 12) {
                        meses[g.mes - 1] += g.valorLiquido;
                    }
                });

                new Chart(document.getElementById('chartBarras'), {
                    type: 'bar',
                    data: {
                        labels: Object.keys(catDados),
                        datasets: [{
                            label: 'Total em Reais (R$)',
                            data: Object.values(catDados),
                            backgroundColor: '#0d47a1',
                            borderRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: { beginAtZero: true }
                        }
                    }
                });

                new Chart(document.getElementById('chartLinha'), {
                    type: 'line',
                    data: {
                        labels: ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'],
                        datasets: [{
                            label: 'Gastos 2025',
                            data: meses,
                            borderColor: '#ff9800',
                            tension: 0.3,
                            fill: true,
                            backgroundColor: '#ff980022'
                        }]
                    }
                });

            } catch (e) {
                console.error("erro ao carregar graficos", e);
            }
        }

        carregarGraficos();
    </script>
</body>
</html>
