<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | Radar Cidadão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="navbar">
        <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/deputados.html">Deputados</a></li>
                <li><a href="/relatorios.html" class="active">Relatórios</a></li>
                <li><a href="/graficos.html">Gráficos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="margin-bottom: 30px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                
                <div>
                    <label>Tipo de Busca</label>
                    <select id="tipo-busca" style="width:100%; padding:10px; border-radius:5px;">
                        <option value="proposicoes">Proposições (Leis/Projetos)</option>
                        <option value="despesas">Cotas Parlamentares (Gastos)</option>
                    </select>
                </div>

                <div>
                    <label>Nome do Deputado</label>
                    <input type="text" id="nome-busca" list="lista-deputados" placeholder="Digite o nome..."
                        style="width:100%; padding:10px; border-radius:5px;" autocomplete="off">
                    <datalist id="lista-deputados"></datalist>
                </div>

                <div>
                    <label>Ano</label>
                    <select id="ano-busca" style="width:100%; padding:10px; border-radius:5px;">
                        <option value="2026">2026</option>
                        <option value="2025" selected>2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                        <option value="2022">2022</option>
                        <option value="2021">2021</option>
                        <option value="2020">2020</option>
                        <option value="2019">2019</option>
                    </select>
                </div>
            </div>

            <button onclick="buscarRelatorio()" class="btn"
                style="margin-top:20px; background: var(--secondary); border:none; cursor:pointer;">
                Pesquisar
            </button>
        </div>

        <div class="card">
            <h3 id="titulo-sessao" style="color: var(--primary); margin-bottom: 10px;">Resultados</h3>
            <p id="total-geral" style="margin-bottom:15px; font-weight:bold; color: #333;"></p>

            <table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f4f4f4;">
                    <tr id="cabecalho-tabela">
                        <th id="th-desc" style="padding:12px; text-align:left;">Descrição</th>
                        <th id="th-info" style="padding:12px; text-align:right;">Informação</th>
                    </tr>
                </thead>
                <tbody id="resultado-tabela">
                    <tr>
                        <td colspan="2" style="padding:20px; text-align:center; color:#999;">
                            Selecione um deputado e clique em pesquisar
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

<script>
    let mapaDeputados = {};

    async function carregarSugestoes() {
        const datalist = document.getElementById('lista-deputados');
        const input = document.getElementById('nome-busca');
        try {
            const res = await fetch("https://dadosabertos.camara.leg.br/api/v2/deputados?ordem=ASC&ordenarPor=nome");
            const json = await res.json();
            
            datalist.innerHTML = "";
            json.dados.forEach(dep => {
                const opt = document.createElement('option');
                opt.value = dep.nome;
                datalist.appendChild(opt);
                mapaDeputados[dep.nome.toLowerCase()] = dep.id;
            });
            input.placeholder = "Digite o nome...";
        } catch (e) { 
            console.error("Erro ao carregar lista:", e);
            input.placeholder = "Erro ao carregar nomes.";
        }
    }

    carregarSugestoes();

    async function buscarRelatorio() {
        const nomeInput = document.getElementById('nome-busca').value.trim().toLowerCase();
        const ano = document.getElementById('ano-busca').value;
        const tipoBusca = document.getElementById('tipo-busca').value;
        const idDeputado = mapaDeputados[nomeInput];

        if (!idDeputado) {
            alert("Por favor, selecione um deputado válido da lista.");
            return;
        }

        const tabela = document.getElementById('resultado-tabela');
        const totalEl = document.getElementById('total-geral');
        const thDesc = document.getElementById('th-desc');
        const thInfo = document.getElementById('th-info');

        tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Buscando dados na Câmara...</td></tr>`;
        totalEl.innerHTML = "";

        try {
            if (tipoBusca === "proposicoes") {
                thDesc.innerText = "Descrição da Proposição";
                thInfo.innerText = "Link Oficial";

                // idDeputadoAutor filtra exclusivamente o deputado digitado
                const url = `https://dadosabertos.camara.leg.br/api/v2/proposicoes?idDeputadoAutor=${idDeputado}&ano=${ano}&ordem=DESC&ordenarPor=id`;
                const res = await fetch(url);
                const json = await res.json();

                if (!json.dados || json.dados.length === 0) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Nenhuma proposição encontrada para este deputado em ${ano}.</td></tr>`;
                    return;
                }

                totalEl.innerHTML = `Proposições de ${document.getElementById('nome-busca').value} em ${ano}: ${json.dados.length}`;
                
                tabela.innerHTML = json.dados.map(p => `
                    <tr style="border-bottom:1px solid #eee;">
                        <td style="padding:12px;">
                            <span style="display:block; font-weight:bold; color:var(--primary);">${p.siglaTipo} ${p.numero}/${p.ano}</span>
                            <span style="font-size:0.85em; color:#555;">${p.ementa || 'Ementa não disponível'}</span>
                        </td>
                        <td style="padding:12px; text-align:right; white-space:nowrap;">
                            <a href="https://www.camara.leg.br/proposicoesWeb/fichadetramitacao?idProposicao=${p.id}" target="_blank" 
                               style="color:white; background:var(--secondary); text-decoration:none; font-size:12px; padding:6px 12px; border-radius:4px; font-weight:bold; display:inline-block;">
                               Detalhes ↗
                            </a>
                        </td>
                    </tr>
                `).join('');

            } else {
                thDesc.innerText = "Categoria de Despesa";
                thInfo.innerText = "Valor Total";

                let pagina = 1;
                let todos = [];
                while (true) {
                    const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${idDeputado}/despesas?ano=${ano}&pagina=${pagina}&itens=100`);
                    const json = await res.json();
                    if (!json.dados || !json.dados.length) break;
                    todos = todos.concat(json.dados);
                    pagina++;
                    if (pagina > 10) break; 
                }

                if (!todos.length) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Nenhum gasto registrado em ${ano}.</td></tr>`;
                    return;
                }

                let resumo = {};
                todos.forEach(g => {
                    resumo[g.tipoDespesa] = (resumo[g.tipoDespesa] || 0) + g.valorLiquido;
                });

                const total = Object.values(resumo).reduce((a, b) => a + b, 0);
                totalEl.innerHTML = `Total gasto por ${document.getElementById('nome-busca').value} em ${ano}: ` + total.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });

                tabela.innerHTML = Object.entries(resumo).sort((a, b) => b[1] - a[1]).map(([cat, valor]) => `
                    <tr style="border-bottom:1px solid #eee;">
                        <td style="padding:12px;">${cat}</td>
                        <td style="padding:12px; text-align:right; font-weight:bold;">
                            ${valor.toLocaleString('pt-br',{style:'currency',currency:'BRL'})}
                        </td>
                    </tr>
                `).join('');
            }
        } catch (e) {
            tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center; color:red;">Erro ao conectar com a API.</td></tr>`;
        }
    }
</script>
</body>
</html>
