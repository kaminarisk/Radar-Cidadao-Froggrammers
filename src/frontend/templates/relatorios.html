<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios | Radar Cidadão</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header class="navbar">
        <a href="/" class="logo">RADAR<span>CIDADÃO</span></a>
        <nav>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/deputados.html">Deputados</a></li>
                <li><a href="/relatorios.html" class="active">Relatórios</a></li>
                <li><a href="/graficos.html">Gráficos</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <div class="card" style="margin-bottom: 30px;">
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;">
                
                <div>
                    <label>Tipo de Busca</label>
                    <select id="tipo-busca" style="width:100%; padding:10px; border-radius:5px;">
                        <option value="proposicoes">Proposições (Leis/Projetos)</option>
                        <option value="despesas">Cotas Parlamentares (Gastos)</option>
                    </select>
                </div>

                <div>
                    <label>Nome do Deputado</label>
                    <input type="text" id="nome-busca" list="lista-deputados" placeholder="Carregando lista..."
                        style="width:100%; padding:10px; border-radius:5px;" autocomplete="off">
                    <datalist id="lista-deputados"></datalist>
                </div>

                <div>
                    <label>Ano</label>
                    <input type="number" id="ano-busca" value="2025"
                        style="width:100%; padding:10px; border-radius:5px;">
                </div>
            </div>

            <button onclick="buscarRelatorio()" class="btn"
                style="margin-top:20px; background: var(--secondary); border:none; cursor:pointer;">
                Pesquisar
            </button>
        </div>

        <div class="card">
            <h3 style="color: var(--primary); margin-bottom: 10px;">Resultados</h3>
            <p id="total-geral" style="margin-bottom:15px; font-weight:bold; color: #333;"></p>

            <table style="width:100%; border-collapse:collapse;">
                <thead style="background:#f4f4f4;">
                    <tr id="cabecalho-tabela">
                        <th style="padding:12px; text-align:left;">Descrição</th>
                        <th style="padding:12px; text-align:right;">Informação</th>
                    </tr>
                </thead>
                <tbody id="resultado-tabela">
                    <tr>
                        <td colspan="2" style="padding:20px; text-align:center; color:#999;">
                            Selecione um deputado e clique em pesquisar
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

<script>
    let mapaDeputados = {};

    // Função robusta para carregar os deputados no datalist
    async function carregarSugestoes() {
        const datalist = document.getElementById('lista-deputados');
        const inputBusca = document.getElementById('nome-busca');
        
        try {
            const res = await fetch("https://dadosabertos.camara.leg.br/api/v2/deputados?ordem=ASC&ordenarPor=nome");
            const json = await res.json();
            
            if (json.dados) {
                datalist.innerHTML = ""; // Limpa qualquer resquício
                json.dados.forEach(dep => {
                    const opt = document.createElement('option');
                    opt.value = dep.nome;
                    datalist.appendChild(opt);
                    // Mapeia o Nome para o ID para uso na busca
                    mapaDeputados[dep.nome] = dep.id;
                });
                inputBusca.placeholder = "Digite o nome...";
                console.log("Lista de deputados carregada com sucesso.");
            }
        } catch (e) {
            console.error("Erro ao carregar lista de deputados:", e);
            inputBusca.placeholder = "Erro ao carregar nomes.";
        }
    }

    // Garante que a lista carregue assim que a página abrir
    document.addEventListener('DOMContentLoaded', carregarSugestoes);

    async function buscarRelatorio() {
        const nomeSelecionado = document.getElementById('nome-busca').value.trim();
        const ano = document.getElementById('ano-busca').value;
        const tipoBusca = document.getElementById('tipo-busca').value;
        const id = mapaDeputados[nomeSelecionado];

        if (!id) {
            alert("Por favor, selecione um deputado da lista oficial.");
            return;
        }

        const tabela = document.getElementById('resultado-tabela');
        const totalEl = document.getElementById('total-geral');
        
        tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Carregando dados de ${nomeSelecionado}...</td></tr>`;
        totalEl.innerHTML = "";

        try {
            if (tipoBusca === "proposicoes") {
                const url = `https://dadosabertos.camara.leg.br/api/v2/proposicoes?idDeputadoAutor=${id}&ano=${ano}&ordem=DESC&ordenarPor=id`;
                const res = await fetch(url);
                const json = await res.json();
                
                if (!json.dados || json.dados.length === 0) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Nenhuma proposição encontrada para este autor em ${ano}.</td></tr>`;
                    return;
                }

                totalEl.innerHTML = `Proposições de ${nomeSelecionado}: ${json.dados.length}`;
                
                tabela.innerHTML = json.dados.map(p => `
                    <tr style="border-bottom:1px solid #eee;">
                        <td style="padding:12px;">
                            <span style="display:block; font-weight:bold; color:var(--primary);">${p.siglaTipo} ${p.numero}/${p.ano}</span>
                            <span style="font-size:0.9em; color:#555;">${p.ementa}</span>
                        </td>
                        <td style="padding:12px; text-align:right; white-space:nowrap;">
                            <a href="https://www.camara.leg.br/proposicoesWeb/fichadetramitacao?idProposicao=${p.id}" target="_blank" 
                               style="color:var(--secondary); text-decoration:none; font-weight:bold; border: 1px solid var(--secondary); padding: 5px 10px; border-radius: 4px;">
                               Detalhes ↗
                            </a>
                        </td>
                    </tr>
                `).join('');

            } else {
                let pagina = 1;
                let todos = [];
                while (true) {
                    const res = await fetch(`https://dadosabertos.camara.leg.br/api/v2/deputados/${id}/despesas?ano=${ano}&pagina=${pagina}&itens=100`);
                    const json = await res.json();
                    if (!json.dados || !json.dados.length) break;
                    todos = todos.concat(json.dados);
                    pagina++;
                    if (pagina > 15) break; 
                }

                if (!todos.length) {
                    tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center;">Nenhum gasto encontrado para este ano.</td></tr>`;
                    return;
                }

                let resumo = {};
                todos.forEach(g => {
                    resumo[g.tipoDespesa] = (resumo[g.tipoDespesa] || 0) + g.valorLiquido;
                });

                const total = Object.values(resumo).reduce((a, b) => a + b, 0);
                totalEl.innerHTML = `Gasto total de ${nomeSelecionado}: ` + total.toLocaleString('pt-br', { style: 'currency', currency: 'BRL' });

                const ordenado = Object.entries(resumo).sort((a, b) => b[1] - a[1]);
                tabela.innerHTML = ordenado.map(([cat, valor]) => `
                    <tr style="border-bottom:1px solid #eee;">
                        <td style="padding:12px;">${cat}</td>
                        <td style="padding:12px; text-align:right; font-weight:bold;">
                            ${valor.toLocaleString('pt-br',{style:'currency',currency:'BRL'})}
                        </td>
                    </tr>
                `).join('');
            }

        } catch (e) {
            console.error(e);
            tabela.innerHTML = `<tr><td colspan="2" style="padding:20px; text-align:center; color:red;">Erro ao conectar com o servidor da Câmara.</td></tr>`;
        }
    }
</script>
</body>
</html>
